<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySpace Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* TEMEL AYARLAR */
        body {
            margin: 0;
            padding: 0;
            background: #0f172a; /* Koyu Lacivert Premium Arka Plan */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        /* ARKA PLAN CANLI AĞ */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        /* KART TASARIMI */
        .card {
            width: 360px;
            height: 600px;
            background: rgba(255, 255, 255, 0.05); /* Şeffaf */
            backdrop-filter: blur(15px); /* Buzlu Cam */
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            position: relative;
        }

        /* RADAR / ARAMA ANİMASYONU */
        .radar-container {
            width: 120px;
            height: 120px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .radar-circle {
            position: absolute;
            border: 2px solid rgba(56, 189, 248, 0.3); /* Açık Mavi */
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        .c1 { width: 100%; height: 100%; animation: pulse 2s infinite; }
        .c2 { width: 70%; height: 70%; animation: pulse 2s infinite 0.5s; }
        .c3 { width: 40%; height: 40%; background: #38bdf8; box-shadow: 0 0 20px #38bdf8; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* BAŞLIKLAR */
        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 30px;
            font-weight: 400;
        }

        /* METİN KUTUSU */
        .description-box {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.05);
            min-height: 140px;
            font-size: 14px;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 20px;
        }

        .highlight {
            color: #38bdf8;
            font-weight: 600;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 16px;
            background: #38bdf8;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* ÖZELLİK ETİKETLERİ */
        .features {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tag {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        /* BUTON */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: #38bdf8;
            color: #0f172a;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .btn:hover {
            background: #7dd3fc;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.6);
            transform: translateY(-2px);
        }

        .rating {
            margin-top: 20px;
            font-size: 14px;
            color: #fbbf24; /* Sarı */
            display: flex;
            align-items: center;
            gap: 5px;
        }

    </style>
</head>
<body>

    <!-- ARKA PLAN EFEKTİ -->
    <canvas id="bg-canvas"></canvas>

    <!-- ANA KART -->
    <div class="card" id="tilt-card">
        
        <!-- RADAR İKONU -->
        <div class="radar-container">
            <div class="radar-circle c1"></div>
            <div class="radar-circle c2"></div>
            <div class="radar-circle c3"></div>
        </div>

        <!-- BAŞLIK -->
        <h1>StudySpace</h1>
        <div class="subtitle">Global Virtual Library</div>

        <!-- ÖZELLİK ETİKETLERİ -->
        <div class="features">
            <span class="tag">Video Call</span>
            <span class="tag">Whiteboard</span>
            <span class="tag">Global</span>
        </div>

        <!-- AÇIKLAMA (YAZI EFEKTİ BURADA) -->
        <div class="description-box">
            <span id="text-target"></span><span class="cursor"></span>
        </div>

        <!-- BUTON -->
        <button class="btn">Find Study Partner</button>

        <!-- PUAN -->
        <div class="rating">
            ★★★★★ <span>(4.9/5)</span>
        </div>

    </div>

    <script>
        // --- 1. YAZI EFEKTİ (TYPEWRITER) ---
        // Buradaki İngilizce tamamen gerçekçi
        const text = "Function: This app is a 24/7 virtual library. It matches you with a study partner from anywhere in the world. You can study together via video call, share screens, and solve homework problems instantly.";
        const target = document.getElementById('text-target');
        let i = 0;

        function typeWriter() {
            if (i < text.length) {
                target.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 30); // Yazma hızı
            }
        }
        // Sayfa yüklenince başlat
        setTimeout(typeWriter, 800);


        // --- 2. 3D TILT EFEKTİ (MOUSE HAREKETİ) ---
        const card = document.getElementById('tilt-card');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 25;
            const y = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });


        // --- 3. ARKA PLAN AĞ EFEKTİ (CANVAS) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        const particleCount = 50;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.fillStyle = 'rgba(56, 189, 248, 0.5)'; // Mavi noktalar
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let j = 0; j < particleCount; j++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let j = 0; j < particles.length; j++) {
                particles[j].update();
                particles[j].draw();
                // Bağlantı çizgileri
                for (let k = j; k < particles.length; k++) {
                    const dx = particles[j].x - particles[k].x;
                    const dy = particles[j].y - particles[k].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        ctx.strokeStyle = `rgba(56, 189, 248, ${0.15 - dist/1000})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[j].x, particles[j].y);
                        ctx.lineTo(particles[k].x, particles[k].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

    </script>
</body>
</html>
